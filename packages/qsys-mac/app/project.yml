# xcodegen spec — generates QSYSDesigner.xcodeproj from this + Sources/.
# Reproducible: commit this file + Sources/, run `xcodegen generate`. The .xcodeproj
# itself is gitignored (regenerated). Ships zero QSC code.
#
# TWO app targets (the true-installer model):
#   • Launcher  → "Q-SYS Designer.app"        — placed in /Applications by the installer; only
#                 launches the already-provisioned Designer. Minimal: Shared + Launcher sources.
#   • Installer → "Install Q-SYS Designer.app" — lives on the dmg; setup UI + recipe Resources +
#                 the emit step. It provisions, then copies the Launcher into /Applications and
#                 paints the extracted QSC icon on it.
# Shared/DataDir.swift compiles into both. package.sh builds Launcher first, notarizes+staples
# it, embeds it into the Installer's Resources, then signs/notarizes the Installer.
name: QSYSDesigner
options:
  bundleIdPrefix: com.byo
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
settings:
  base:
    # Dev builds are ad-hoc signed. Developer ID + hardened runtime + notarization is package.sh.
    CODE_SIGN_IDENTITY: "-"
    CODE_SIGN_STYLE: Manual
    ENABLE_HARDENED_RUNTIME: NO
    SWIFT_VERSION: "5.0"
targets:
  Launcher:
    type: application
    platform: macOS
    sources:
      - path: Sources/Shared
      - path: Sources/Launcher
    settings:
      base:
        PRODUCT_NAME: "Q-SYS Designer"
        PRODUCT_BUNDLE_IDENTIFIER: com.byo.qsys-designer-wine
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: Launcher-Info.plist
        CODE_SIGN_ENTITLEMENTS: QSYSDesigner.entitlements
  Installer:
    type: application
    platform: macOS
    sources:
      - path: Sources/Shared
      - path: Sources/Installer
      # Original wrapper app icon (committed) → Contents/Resources/AppIcon.icns, referenced by
      # Info.plist CFBundleIconFile. The installer's own original download-arrow install glyph — NOT QSC's logo.
      - path: AppIcon.icns
        buildPhase: resources
      # The recipe engine, bundled into Contents/Resources so the installer can provision at
      # first run. provision.sh sources lib/recipe.sh relative to itself.
      - path: ../provision.sh
        buildPhase: resources
      # qsys-mac — the headless CLI (install/remove/status). Same provision.sh + emit the GUI uses,
      # exposed for SSH/scripted use. Self-locates these Resources as siblings (or QSYS_RES).
      - path: ../qsys-mac
        buildPhase: resources
      - path: ../lib
        type: folder
        buildPhase: resources
      # Selawik (unmodified, OFL-licensed) — renamed locally at provision time into a
      # "Segoe UI" shim so WPF's missing-family fallback (drops U+002D under Wine,
      # bug 59925) never engages. See apply_prefix_tweaks in lib/recipe.sh.
      - path: ../assets
        type: folder
        buildPhase: resources
      # Tier-B bundle — populated by scripts/bundle-deps.sh BEFORE xcodegen/xcodebuild:
      #   bin/   → 7z+7z.so, wrestool, icotool+libpng, pre-built appmenu.dylib + iconpad,
      #            pre-patched wine loader (toolchain-free first run)
      #   cache/ → Wine tarball + the two .NET installers (offline first run)
      # Both are .gitignored (large, license-redistributable, regenerated by the script).
      - path: Resources/bin
        type: folder
        buildPhase: resources
      - path: Resources/cache
        type: folder
        buildPhase: resources
    settings:
      base:
        PRODUCT_NAME: "Install Q-SYS Designer"
        PRODUCT_BUNDLE_IDENTIFIER: com.byo.qsys-designer-installer
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: Info.plist
        # A6: the installer only spawns wine as a CHILD (which carries its own entitlements), so it
        # does NOT need the launcher's JIT/no-libval set — minimal entitlements, smaller surface.
        CODE_SIGN_ENTITLEMENTS: Installer.entitlements
