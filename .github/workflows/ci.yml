name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: node ${{ matrix.node }} / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      # Lean matrix: Node 18/20/22 (the supported range) on Linux, plus one
      # macOS job for the Mac-focused qsys-mac tooling. No Windows — qsys-mac is
      # macOS-only and the rest is portable pure-JS, so it'd add cost without
      # meaningful coverage.
      matrix:
        include:
          - { os: ubuntu-latest, node: 18 }
          - { os: ubuntu-latest, node: 20 }
          - { os: ubuntu-latest, node: 22 }
          - { os: macos-latest, node: 20 }
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      # Only qsys-qrc builds at install (its `prepare`); it has no workspace deps
      # so the order is always safe. The leaf packages build via `prepack` (at
      # publish), so a clean install never hits a build-order failure.
      - run: npm ci

      # Build in dependency order (qsys-qrc first) so the dependent packages can
      # resolve its `dist`. This also verifies every package compiles to dist.
      - run: npm run build

      - run: npm run typecheck

      # The emulator-backed e2e suites auto-skip without the private qsys-emulator
      # package (see scripts/run-if-emulator.mjs); the qsys-mac unit tests run
      # everywhere. Typecheck above is the primary hardware-free gate.
      - run: npm test
