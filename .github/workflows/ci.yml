name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: node ${{ matrix.node }} / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      # Lean matrix: Node 22 (LTS) + 24 (current) on Linux, plus one macOS job for
      # the Mac-focused qsys-mac tooling. Node 22.13+ is the floor (pnpm 11 requires
      # it). No Windows — qsys-mac is macOS-only and the rest is portable pure-JS, so
      # it'd add cost without meaningful coverage.
      matrix:
        include:
          - { os: ubuntu-latest, node: 22 }
          - { os: ubuntu-latest, node: 24 }
          - { os: macos-latest, node: 24 }
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      # Install pnpm (version comes from the root package.json "packageManager"
      # field) before setup-node so its pnpm-store cache can resolve.
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.3.0

      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5.0.0
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm

      # pnpm builds qsys-qrc at install (its `prepare`); --frozen-lockfile fails if
      # the lockfile is stale rather than silently rewriting it.
      - run: pnpm install --frozen-lockfile

      # Build in dependency order (pnpm -r is topological, qsys-qrc first) so the
      # dependent packages can resolve its `dist`, and every package compiles.
      - run: pnpm -r build

      - run: pnpm run typecheck

      # Full e2e — the QRC/MCP suites (incl. the AutoPoll-reconnect regression) run
      # against the in-repo qsys-mock-core, so they exercise the protocol on every
      # push with no hardware and no private dependency.
      - run: pnpm test

      # macOS-only installer smoke test: shell-syntax across the 9 installer scripts,
      # WINEDLLOVERRIDES launch-path parity (dev / generated .app / installed GUI), the
      # MSI path-containment fixtures, and the Wine process-cleanup harness (which stubs
      # wineserver, so no real Wine is needed). QSYS_SKIP_XCODE=1 skips the xcodebuild
      # step on purpose: the Installer target copies Resources/{bin,cache}, which are
      # gitignored and only materialized by bundle-deps.sh (it downloads the Wine + .NET
      # bundle) — a packaging concern, not a per-PR gate. Without them `xcodegen generate`
      # fails spec validation ("missing source directory"), so a full build can't run in
      # a clean checkout. Runs only on the macOS matrix leg.
      - name: Installer smoke test (qsys-mac-installer)
        if: matrix.os == 'macos-latest'
        env:
          QSYS_SKIP_XCODE: "1"
        run: packages/qsys-mac-installer/scripts/test.sh
