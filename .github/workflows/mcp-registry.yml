name: Publish qsys-mcp to MCP Registry

# Manually dispatched. The publisher binary is pinned to an exact release and
# checksum-verified before it runs with this job's OIDC authority — never `latest`
# (a moving artifact would be arbitrary code execution in a registry-authorized
# job). To upgrade: bump MCP_PUBLISHER_VERSION and take the matching sha256 for
# mcp-publisher_linux_amd64.tar.gz from that release's registry_<ver>_checksums.txt.
# The `mcp-registry` environment lets repo Settings → Environments add
# required-reviewer approval in front of publication.
on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: mcp-registry # protection rules (required reviewers) are configured in repo settings
    env:
      MCP_PUBLISHER_VERSION: v1.7.9
      MCP_PUBLISHER_SHA256: ab128162b0616090b47cf245afe0a23f3ef08936fdce19074f5ba0a4469281ac
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      - name: Install mcp-publisher (pinned + checksum-verified)
        run: |
          set -euo pipefail
          curl -fsSLo mcp-publisher.tar.gz "https://github.com/modelcontextprotocol/registry/releases/download/${MCP_PUBLISHER_VERSION}/mcp-publisher_linux_amd64.tar.gz"
          echo "${MCP_PUBLISHER_SHA256}  mcp-publisher.tar.gz" | sha256sum -c -
          tar xzf mcp-publisher.tar.gz mcp-publisher

      - name: Validate registry manifest
        working-directory: packages/qsys-mcp
        run: ../../mcp-publisher validate

      - name: Authenticate to MCP Registry
        run: ./mcp-publisher login github-oidc

      - name: Publish qsys-mcp
        working-directory: packages/qsys-mcp
        run: ../../mcp-publisher publish
