name: Publish to npm

# Tag-driven npm publishing via trusted publishing (OIDC): no NPM_TOKEN, and npm
# emits build provenance automatically (public repo + public packages). Push a
# per-package tag (see RELEASE.md), e.g. `qsys-qrc-v0.2.1`, and this publishes that
# one package. `qsys-mac-installer-v*` (the DMG) is a GitHub Release asset, not npm,
# and is intentionally not matched here.
on:
  push:
    tags:
      - 'qsys-qrc-v*'
      - 'qsys-cli-v*'
      - 'qsys-mcp-v*'
      - 'qsys-mac-v*'

permissions:
  contents: read
  id-token: write # the OIDC grant that trusted publishing exchanges for a short-lived npm credential

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      # pnpm does the workspace build + pack (it rewrites the `workspace:^` protocol
      # to a real version); npm does the OIDC publish. Version comes from the root
      # package.json "packageManager" field.
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v5
        with:
          node-version: 24 # ships npm >= 11.5.1 (with sigstore) — required for trusted publishing + provenance
          registry-url: 'https://registry.npmjs.org'
          cache: pnpm

      # NB: do NOT `npm install -g npm@latest` — the global self-reinstall drops
      # npm's bundled `sigstore` dep, which `--provenance` needs (MODULE_NOT_FOUND).
      # Node 24's bundled npm is new enough and has sigstore intact.

      - run: pnpm install --frozen-lockfile

      - run: pnpm -r build

      - name: Resolve package name from the tag
        id: pkg
        # qsys-qrc-v0.2.1 -> qsys-qrc ; qsys-cli-v0.1.3 -> qsys-cli (dir packages/qsys)
        run: echo "name=${GITHUB_REF_NAME%-v*}" >> "$GITHUB_OUTPUT"

      # pnpm pack bundles dist/ and rewrites workspace:^ -> a real range in the
      # tarball's manifest; npm then publishes that tarball. Trusted publishing
      # (OIDC) authenticates it with no token and attaches provenance.
      - name: Pack (pnpm) and publish (npm, OIDC + provenance)
        run: |
          set -euo pipefail
          out="$RUNNER_TEMP/pkg"
          pnpm --filter "${{ steps.pkg.outputs.name }}" pack --pack-destination "$out"
          npm publish "$out"/*.tgz --access public --provenance
